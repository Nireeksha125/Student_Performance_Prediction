<!DOCTYPE html>
<html>

<head>

    <title>Edit Prediction</title>

</head>

<body id="body"
      style="
      font-family:Arial;
      background:#f4f4f4;
      text-align:center;
      padding-top:100px;
">

    <!-- THEME BUTTON -->

    <button onclick="toggleTheme()"
            style="
            position:absolute;
            top:20px;
            right:20px;
            width:55px;
            height:55px;
            border:none;
            background:black;
            color:white;
            border-radius:50%;
            cursor:pointer;
            font-size:22px;
    ">

        🌓

    </button>

    <!-- CARD -->

    <div id="card"
         style="
         background:white;
         width:50%;
         margin:auto;
         padding:40px;
         border-radius:15px;
         box-shadow:0px 0px 10px gray;
    ">

        <h1 style="
            color:#4f46e5;
            margin-bottom:40px;
        ">

            Edit Prediction

        </h1>

        <!-- FORM -->

        <form method="POST">

            <input type="number"
                   name="math"
                   value="{{ data.math }}"
                   required
                   style="
                   width:80%;
                   padding:15px;
                   margin:10px;
                   border-radius:10px;
                   border:1px solid gray;
                   font-size:16px;
            ">

            <br>

            <input type="number"
                   name="reading"
                   value="{{ data.reading }}"
                   required
                   style="
                   width:80%;
                   padding:15px;
                   margin:10px;
                   border-radius:10px;
                   border:1px solid gray;
                   font-size:16px;
            ">

            <br>

            <input type="number"
                   name="writing"
                   value="{{ data.writing }}"
                   required
                   style="
                   width:80%;
                   padding:15px;
                   margin:10px;
                   border-radius:10px;
                   border:1px solid gray;
                   font-size:16px;
            ">

            <br><br>

            <button type="submit"
                    style="
                    padding:15px 30px;
                    border:none;
                    background:#4f46e5;
                    color:white;
                    border-radius:10px;
                    font-size:18px;
                    cursor:pointer;
            ">

                Update Prediction

            </button>

        </form>

    </div>

    <!-- JAVASCRIPT -->

    <script>

        // APPLY SAVED THEME

        window.onload = function () {

            let savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {

                enableDarkMode();

            }

        }

        // TOGGLE THEME

        function toggleTheme() {

            let currentTheme = localStorage.getItem("theme");

            if (currentTheme === "dark") {

                localStorage.setItem("theme", "light");

                enableLightMode();

            }

            else {

                localStorage.setItem("theme", "dark");

                enableDarkMode();

            }

        }

        // DARK MODE

        function enableDarkMode() {

            document.getElementById("body").style.background = "black";

            document.getElementById("body").style.color = "white";

            document.getElementById("card").style.background = "#1f2937";

        }

        // LIGHT MODE

        function enableLightMode() {

            document.getElementById("body").style.background = "#f4f4f4";

            document.getElementById("body").style.color = "black";

            document.getElementById("card").style.background = "white";

        }

    </script>

</body>

</html>
